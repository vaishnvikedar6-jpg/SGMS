<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Dept | SGMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Academic sathi Serious Blue Theme */
            --dept-color: #2563eb; 
            --glass: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white;
            min-height: 100vh;
            padding: 30px;
        }

        .header-box {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .head-info h2 { margin: 0; color: #bfdbfe; }
        .head-info p { margin: 5px 0 0; font-weight: 600; }

        .report-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .column {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 20px;
            min-height: 400px;
        }

        .column h3 {
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            margin-top: 0;
        }

        .card {
            background: white;
            color: #1e293b;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card h4 { margin: 0; color: var(--dept-color); }
        .card p { margin: 5px 0; font-size: 14px; }
        
        .btn-back {
            color: white; text-decoration: none; font-weight: 700;
            background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="header-box">
        <div class="head-info">
            <p>DEPARTMENT OF ACADEMICS</p>
            <h2>Head: Prof. Suresh Deshmukh</h2>
            <span>Email: s.deshmukh@college.edu</span>
        </div>
        <a href="admindashboard.html" class="btn-back">← Back to Dashboard</a>
    </div>

    <div class="report-container">
        <div class="column">
            <h3 style="color: #f87171;">⚠️ Pending Issues</h3>
            <div id="pendingList"></div>
        </div>

        <div class="column">
            <h3 style="color: #4ade80;">✅ Solved Reports</h3>
            <div id="solvedList"></div>
        </div>
    </div>

    <script>
        function loadDeptData() {
            const list = JSON.parse(localStorage.getItem('grievances')) || [];
            // Fakt 'Academic Help' filter kara
            const deptIssues = list.filter(i => i.category === 'Academic Help');

            const pendingCont = document.getElementById('pendingList');
            const solvedCont = document.getElementById('solvedList');

            pendingCont.innerHTML = "";
            solvedCont.innerHTML = "";

            deptIssues.forEach(item => {
                const html = `
                    <div class="card">
                        <h4>${item.name} (${item.prn})</h4>
                        <p>${item.text}</p>
                        <small>Date: ${item.date}</small>
                    </div>
                `;
                if(item.status === 'Resolved') {
                    solvedCont.innerHTML += html;
                } else {
                    pendingCont.innerHTML += html;
                }
            });
        }
        loadDeptData();
    </script>
</body>
</html>
