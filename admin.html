<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | SGMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-purple: #4c1d95;
            --soft-purple: #a78bfa;
            --danger-red: #be123c;
            --success-green: #059669;
            --white-glass: rgba(255, 255, 255, 0.85);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            padding: 30px; 
            background: linear-gradient(135deg, #f5f3ff 0%, #fdf2f8 100%);
            min-height: 100vh;
        }

        .container { 
            max-width: 1100px; 
            margin: auto; 
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { 
            background: var(--white-glass);
            backdrop-filter: blur(15px);
            padding: 25px 35px; 
            border-radius: 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
        }

        h1 { 
            margin: 0; 
            font-size: 24px; 
            font-weight: 800; 
            color: var(--deep-purple);
            letter-spacing: -0.5px;
        }

        .logout-btn { 
            background: #fff;
            color: var(--danger-red); 
            padding: 10px 20px; 
            border: 1px solid #fee2e2; 
            border-radius: 14px; 
            cursor: pointer; 
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s;
        }

        .logout-btn:hover { 
            background: var(--danger-red);
            color: white;
            box-shadow: 0 5px 15px rgba(190, 18, 60, 0.2);
        }

        /* Table Styling */
        .table-container {
            background: var(--white-glass);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        table { width: 100%; border-collapse: collapse; }
        
        th { 
            background: rgba(76, 29, 149, 0.05);
            color: var(--deep-purple); 
            padding: 20px; 
            text-align: left; 
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td { 
            padding: 20px; 
            border-bottom: 1px solid rgba(0,0,0,0.03); 
            font-size: 15px;
            color: #4b5563;
        }

        tr:last-child td { border: none; }

        /* Status Pills */
        .status-pill { 
            padding: 6px 14px; 
            border-radius: 12px; 
            font-size: 12px; 
            font-weight: 700; 
        }
        .Pending { background: #fef3c7; color: #92400e; }
        .Resolved { background: #dcfce7; color: #166534; }
        .URGENT { background: #fee2e2; color: #991b1b; border: 1px solid rgba(153, 27, 27, 0.1); }

        /* Action Buttons */
        .action-btn { 
            border: none; 
            padding: 8px 16px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 13px; 
            font-weight: 600;
            transition: 0.2s;
        }
        .res-btn { background: var(--success-green); color: white; margin-right: 8px; }
        .res-btn:hover { transform: scale(1.05); background: #047857; }
        
        .del-btn { background: #f3f4f6; color: #6b7280; }
        .del-btn:hover { background: #e5e7eb; color: var(--danger-red); }

        small { color: #9ca3af; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Student Grievances <span style="font-weight: 400; opacity: 0.5;">| Admin</span></h1>
        <button onclick="logout()" class="logout-btn">Logout</button>
    </div>

    <div class="table-container">
        <table id="grievanceTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Student Details</th>
                    <th>Complaint</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableContent">
                </tbody>
        </table>
    </div>
</div>

<script>
    // 1. SECURITY CHECK
    if (sessionStorage.getItem("adminAuthenticated") !== "true") {
        window.location.href = "admin-login.html"; 
    }

    // 2. LOGOUT
    function logout() {
        sessionStorage.removeItem("adminAuthenticated");
        window.location.href = "admin-login.html"; 
    }

    // 3. RENDER TABLE
    function renderTable() {
        const grievances = JSON.parse(localStorage.getItem('grievances')) || [];
        const tbody = document.getElementById('tableContent');
        tbody.innerHTML = grievances.length === 0 ? 
            `<tr><td colspan="5" style="text-align:center; padding: 50px; color: #9ca3af;">No records found.</td></tr>` : "";

        grievances.forEach(item => {
            // Check if it's urgent from the student form
            const isUrgent = item.category === "🚨 URGENT";
            const displayStatus = isUrgent && item.status === "Pending" ? "URGENT" : item.status;

            tbody.innerHTML += `
                <tr>
                    <td><strong>${item.date}</strong></td>
                    <td>
                        <div style="font-weight: 700; color: var(--deep-purple);">${item.name}</div>
                        <small>ID: ${item.prn}</small>
                    </td>
                    <td style="max-width: 350px; line-height: 1.5;">${item.text}</td>
                    <td><span class="status-pill ${displayStatus}">${displayStatus}</span></td>
                    <td>
                        <div style="display: flex;">
                            ${item.status === 'Pending' ? `<button class="action-btn res-btn" onclick="resolveIssue(${item.id})">Resolve</button>` : ''}
                            <button class="action-btn del-btn" onclick="deleteIssue(${item.id})">Delete</button>
                        </div>
                    </td>
                </tr>
            `;
        });
    }

    function resolveIssue(id) {
        let list = JSON.parse(localStorage.getItem('grievances'));
        list = list.map(g => g.id === id ? {...g, status: 'Resolved'} : g);
        localStorage.setItem('grievances', JSON.stringify(list));
        renderTable();
    }

    function deleteIssue(id) {
        if(confirm("Are you sure you want to delete this record?")) {
            let list = JSON.parse(localStorage.getItem('grievances'));
            list = list.filter(g => g.id !== id);
            localStorage.setItem('grievances', JSON.stringify(list));
            renderTable();
        }
    }

    window.onload = renderTable;
</script>

</body>
</html>
