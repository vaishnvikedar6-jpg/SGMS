<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Navigation | SGMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --princess-pink: #fbcfe8;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.2);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            background: linear-gradient(135deg, rgba(76, 29, 149, 0.95), rgba(219, 39, 119, 0.9));
            background-attachment: fixed;
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .main-layout { 
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .welcome-text {
            text-align: center;
            margin-bottom: 50px;
        }

        .welcome-text h1 { font-size: 32px; margin: 0; }
        .welcome-text p { color: var(--princess-pink); font-weight: 600; }

        /* Dept Selection Grid */
        .dept-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }

        .dept-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 50px 30px;
            border-radius: 30px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            text-decoration: none;
            color: white;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .dept-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.3);
            border-color: var(--princess-pink);
        }

        .dept-card h3 { font-size: 24px; margin: 15px 0 5px; }
        .dept-card span { font-size: 40px; }
        .dept-card p { font-size: 13px; opacity: 0.8; font-weight: 600; }

        .logout-btn {
            background: transparent;
            border: 2px solid var(--white);
            color: var(--white);
            padding: 8px 20px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .dept-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h2 style="margin:0;">✨ SGMS Admin Panel</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </header>

    <div class="main-layout">
        <div class="welcome-text">
            <h1>Welcome, Admin</h1>
            
        </div>

        <div class="dept-grid">
            <a href="academic.html" class="dept-card">
                <span>📚</span>
                <h3>Academic</h3>
                <p>Course, Exam & Faculty Issues</p>
            </a>

            <a href="infrastructure.html" class="dept-card">
                <span>🏫</span>
                <h3>Infrastructure</h3>
                <p>Lab, Bench & Building Maintenance</p>
            </a>

            <a href="cleanliness.html" class="dept-card">
                <span>🧹</span>
                <h3>Cleanliness</h3>
                <p>Campus & Washroom Hygiene</p>
            </a>

            <a href="bullying.html" class="dept-card">
                <span>🚨</span>
                <h3>Bullying</h3>
                <p>Report Harassment & Urgent Cases</p>
            </a>
        </div>
    </div>

    <script>
        function logout() {
            sessionStorage.clear();
            window.location.href = "adminform.html";
        }
    </script>
</body>
</html>
