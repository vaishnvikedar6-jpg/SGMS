<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleanliness Dept | SGMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --dept-color: #059669; --glass: rgba(255, 255, 255, 0.15); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: linear-gradient(135deg, #064e3b, #10b981); color: white; min-height: 100vh; padding: 30px; }
        .header-box { background: var(--glass); backdrop-filter: blur(10px); padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .head-info h2 { margin: 0; color: #d1fae5; }
        .column { background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 20px; min-height: 400px; border: 1px solid rgba(255,255,255,0.1); }
        .card { background: white; color: #064e3b; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .report-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .btn-back { color: white; text-decoration: none; font-weight: 700; background: #064e3b; padding: 10px 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="header-box">
        <div class="head-info">
            <p>SANITATION & HYGIENE DEPT</p>
            <h2>Head: Mrs. Sunita Shinde</h2>
            <span>Contact: Ext 404 (Admin Block)</span>
        </div>
        <a href="admindashboard.html" class="btn-back">← Back</a>
    </div>
    <div class="report-container">
        <div class="column"><h3>🧹 Action Required</h3><div id="pendingList"></div></div>
        <div class="column"><h3>✨ Campus Cleaned</h3><div id="solvedList"></div></div>
    </div>
    <script>
        function loadData() {
            const list = JSON.parse(localStorage.getItem('grievances')) || [];
            const deptIssues = list.filter(i => i.category === 'Cleanliness');
            deptIssues.forEach(item => {
                const html = `<div class="card"><h4>${item.name}</h4><p>${item.text}</p><small>PRN: ${item.prn}</small></div>`;
                item.status === 'Resolved' ? document.getElementById('solvedList').innerHTML += html : document.getElementById('pendingList').innerHTML += html;
            });
        }
        loadData();
    </script>
</body>
</html>
