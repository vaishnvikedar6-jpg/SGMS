<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Submission | SGMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-purple: #4c1d95;
            --soft-purple: #a78bfa;
            --bg-gradient: linear-gradient(135deg, #f5f3ff 0%, #fdf2f8 100%);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; background: var(--bg-gradient); 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .receipt-card {
            background: white; padding: 40px; border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            width: 100%; max-width: 450px; text-align: center;
        }

        .success-icon { font-size: 50px; margin-bottom: 20px; }

        h2 { color: var(--deep-purple); margin-bottom: 10px; }
        
        .info-box {
            background: #f8fafc; border-radius: 20px;
            padding: 20px; margin-top: 25px; text-align: left;
            border: 1px dashed var(--soft-purple);
        }

        .info-item { margin-bottom: 12px; font-size: 14px; }
        .info-label { font-weight: 700; color: #64748b; display: block; }
        .info-value { color: var(--deep-purple); font-weight: 600; }

        .btn-home {
            display: inline-block; margin-top: 30px;
            background: var(--deep-purple); color: white;
            padding: 12px 25px; border-radius: 15px;
            text-decoration: none; font-weight: 700; transition: 0.3s;
        }

        .btn-home:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="receipt-card">
        <div class="success-icon">✅</div>
        <h2>Submission Received!</h2>
        <p style="color: #64748b; font-size: 14px;">Fakt tula he details distil. Admin yaavar lavkarach action gheil.</p>

        <div id="studentData" class="info-box">
            </div>

        <a href="index.html" class="btn-home">Submit Another Issue</a>
    </div>

    <script>
        function displayLatestGrievance() {
            const list = JSON.parse(localStorage.getItem('grievances')) || [];
            
            if (list.length === 0) {
                document.getElementById('studentData').innerHTML = "<p>No recent submission found.</p>";
                return;
            }

            // List madhli saglyat shevatchi (latest) entry ghyaychi
            const latest = list[list.length - 1];

            document.getElementById('studentData').innerHTML = `
                <div class="info-item">
                    <span class="info-label">Student Name:</span>
                    <span class="info-value">${latest.name}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">PRN:</span>
                    <span class="info-value">${latest.prn}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Category:</span>
                    <span class="info-value">${latest.category}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Message:</span>
                    <span class="info-value">${latest.text}</span>
                </div>
                <div class="info-item" style="margin-top: 15px; border-top: 1px solid #ddd; padding-top: 10px;">
                    <span class="info-label">Status:</span>
                    <span class="info-value" style="color: #db2777;">● ${latest.status}</span>
                </div>
            `;
        }

        displayLatestGrievance();
    </script>
</body>
</html>
