<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGMS Elite | Institutional Command</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    :root{
      --primary-orange:#ff8c00;
      --deep-orange:#e67e00;
      --accent-amber:#fff7ed;
      --bg-white:#ffffff;
      --bg-light:#fcfcfd;
      --text-dark:#0f172a;
      --text-slate:#64748b;
      --border-light:#f1f5f9;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Plus Jakarta Sans',sans-serif;
    }

    body{
      background-color:var(--bg-light);
      color:var(--text-dark);
      display:flex;
      min-height:100vh;
    }

    /* SIDEBAR */
    .sidebar{
      width:280px;
      background:var(--bg-white);
      border-right:2px solid var(--border-light);
      padding:40px 24px;
      display:flex;
      flex-direction:column;
      position:fixed;
      height:100vh;
    }

    .logo{
      font-size:1.6rem;
      font-weight:800;
      margin-bottom:50px;
      text-decoration:none;
      color:var(--text-dark);
      letter-spacing:-1.5px;
    }

    .logo span{
      color:var(--primary-orange);
    }

    .nav-label{
      font-size:0.7rem;
      text-transform:uppercase;
      letter-spacing:2px;
      color:#cbd5e1;
      margin-bottom:20px;
      font-weight:700;
    }

    .nav-item{
      padding:14px 18px;
      border-radius:16px;
      text-decoration:none;
      color:var(--text-slate);
      font-weight:600;
      margin-bottom:8px;
      transition:0.3s;
      display:flex;
      align-items:center;
      gap:12px;
    }

    .nav-item:hover,.nav-item.active{
      background:var(--accent-amber);
      color:var(--primary-orange);
      transform:translateX(5px);
    }

    /* MAIN */
    .main-content{
      margin-left:280px;
      flex:1;
      padding:50px;
    }

    .header-section{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:45px;
    }

    .header-section h1{
      font-size:2.2rem;
      font-weight:800;
    }

    /* GRID */
    .grid-container{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:30px;
    }

    .card{
      background:var(--bg-white);
      border-radius:32px;
      padding:30px;
      border:1px solid var(--border-light);
      box-shadow:0 10px 30px rgba(0,0,0,0.02);
    }

    .large-card{
      grid-column:span 2;
    }

    /* TABLE */
    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0 12px;
      margin-top:20px;
    }

    th{
      text-align:left;
      padding:15px;
      color:var(--text-slate);
      font-weight:700;
      font-size:0.8rem;
      text-transform:uppercase;
    }

    td{
      background:var(--bg-white);
      padding:20px 15px;
      font-size:0.95rem;
      border-top:1px solid var(--border-light);
      border-bottom:1px solid var(--border-light);
    }

    td:first-child{
      border-left:1px solid var(--border-light);
      border-radius:16px 0 0 16px;
      font-weight:700;
    }

    td:last-child{
      border-right:1px solid var(--border-light);
      border-radius:0 16px 16px 0;
    }

    .status{
      padding:6px 14px;
      border-radius:50px;
      font-size:0.75rem;
      font-weight:800;
      background:#fff7ed;
      color:#c2410c;
    }

    .btn-orange{
      background:var(--primary-orange);
      color:white;
      border:none;
      padding:12px 24px;
      border-radius:14px;
      font-weight:700;
      cursor:pointer;
    }

  </style>
</head>

<body>

<div class="sidebar">

  <a href="index.html" class="logo">SGMS <span>Elite</span></a>

  <div class="nav-label">Main Console</div>

  <a href="#" class="nav-item active">🏠 System Overview</a>
  <a href="support.html" class="nav-item">🛡️ Vigilance Center</a>
  <a href="#" class="nav-item">📊 Data Insights</a>

  <div class="nav-label" style="margin-top:30px;">Administration</div>

  <a href="#" class="nav-item">👥 Faculty Access</a>
  <a href="#" class="nav-item">⚙️ Settings</a>

</div>

<div class="main-content">

  <div class="header-section">

    <div>
      <h1>Executive Command</h1>
      <p style="color:var(--text-slate);margin-top:5px;">Unified Security Monitoring Dashboard</p>
    </div>

    <button class="btn-orange">+ Create Incident Report</button>

  </div>

  <div class="grid-container">

    <div class="card large-card">

      <h3 style="margin-bottom:10px;">Monitor Active Streams</h3>

      <table>

        <thead>
        <tr>
          <th>Student</th>
          <th>Case ID</th>
          <th>Category</th>
          <th>Status</th>
        </tr>
        </thead>

        <tbody id="complaintTable">

        </tbody>

      </table>

    </div>

  </div>

</div>

<script>
  // Fetch complaints and student names dynamically
  fetch("http://localhost:8080/api/complaints")
  .then(response => response.json())
  .then(async data => {

    const table = document.getElementById("complaintTable");

    for(const c of data){
      // Get student name from complaint object
      let studentName = c.student ? c.student.name : "Unknown";

      const row = `
        <tr>
          <td>${studentName}</td>
          <td>#ELT-${c.id}</td>
          <td>${c.title}</td>
          <td><span class="status">${c.status}</span></td>
        </tr>
      `;

      table.innerHTML += row;
    }

  })
  .catch(error => console.error("Error loading complaints:",error));
</script>

</body>
</html>
