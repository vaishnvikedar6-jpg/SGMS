<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite | Analytics</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #fff5f0; padding: 60px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; max-width: 1100px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 50px; }
        .header h1 { color: #4a041a; font-size: 2.5rem; }
        .ana-card {
            background: #fff;
            padding: 40px;
            border-radius: 40px;
            border: 1px solid #ffdeeb;
            text-align: center;
            box-shadow: 0 15px 35px rgba(247, 37, 133, 0.05);
            transition: 0.3s;
        }
        .ana-card:hover { transform: translateY(-10px); border-color: #f72585; }
        .value { font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, #f72585, #ffb703); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .label { color: #8a6a76; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }
        .chart-placeholder {
            grid-column: span 3;
            background: white;
            height: 300px;
            border-radius: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffdeeb;
            font-size: 5rem;
            border: 2px dashed #ffdeeb;
        }
    </style>
</head>
<body>
<div class="header"><h1>Insights <span>Analytics</span> ✨</h1></div>
<div class="grid">
    <div class="ana-card"><div class="value">12</div><div class="label">Total Filed</div></div>
    <div class="ana-card"><div class="value">08</div><div class="label">Resolved</div></div>
    <div class="ana-card"><div class="value">24h</div><div class="label">Avg Response</div></div>
    <div class="chart-placeholder">📈</div>
</div>
</body>
</html>
