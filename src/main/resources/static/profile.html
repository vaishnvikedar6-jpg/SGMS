<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite | Profile Settings</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #fff5f0; min-height: 100vh; padding: 40px; display: flex; flex-direction: column; align-items: center; }

        nav { width: 100%; max-width: 1100px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); padding: 15px 40px; border-radius: 25px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255, 255, 255, 0.5); margin-bottom: 50px; }
        .nav-logo { font-size: 1.4rem; font-weight: 800; color: #4a041a; text-decoration: none; }
        .nav-logo span { background: linear-gradient(135deg, #f72585, #ffb703); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { text-decoration: none; color: #8a6a76; font-size: 0.9rem; font-weight: 700; }

        .settings-card { width: 100%; max-width: 800px; background: white; padding: 50px; border-radius: 50px; box-shadow: 0 20px 50px rgba(247, 37, 133, 0.05); text-align: center; }
        .profile-upload { width: 120px; height: 120px; border-radius: 40px; background: linear-gradient(135deg, #f72585, #ffb703); margin: 0 auto 30px; display: flex; justify-content: center; align-items: center; font-size: 3rem; color: white; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(247, 37, 133, 0.2); }
        .profile-upload:hover { transform: scale(1.05) rotate(5deg); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .input-group { text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: #8a6a76; font-size: 0.85rem; padding-left: 10px; }
        input { width: 100%; padding: 15px 20px; border-radius: 20px; border: 1px solid #ffdeeb; outline: none; }
        input:focus { border-color: #f72585; }

        .save-btn { margin-top: 40px; width: 100%; padding: 18px; background: #4a041a; color: white; border: none; border-radius: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .save-btn:hover { background: #f72585; transform: translateY(-3px); }
    </style>
</head>
<body>
<nav>
    <a href="student-hub.html" class="nav-logo">SGMS <span>Elite</span></a>
    <ul class="nav-links">
        <li><a href="student-hub.html">Home</a></li>
        <li><a href="analytics.html">History</a></li>
        <li><a href="support.html">Support</a></li>
    </ul>
</nav>

<div class="settings-card">
    <div class="profile-upload">V</div>
    <h2 style="color: #4a041a; margin-bottom: 30px;">Profile <span>Settings</span> ✨</h2>

    <div class="form-grid">
        <div class="input-group"><label>Full Name</label><input type="text" value="Vaishnavi Kedar"></div>
        <div class="input-group"><label>PRN Number</label><input type="text" value="124A1057" disabled></div>
        <div class="input-group"><label>Email</label><input type="email" value="vaishnavi@siesgst.ac.in"></div>
        <div class="input-group"><label>Department</label><input type="text" value="Computer Engineering"></div>
    </div>
    <button class="save-btn">Update Profile</button>
</div>
</body>
</html>
